<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoLab WebSocket Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #00ff88;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        .setup {
            background: #1e1e3f;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .setup input {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #2a2a4a;
            color: #fff;
            width: 150px;
        }
        .setup button {
            padding: 10px 20px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .setup button:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }
        .chat-container {
            display: none;
            background: #1e1e3f;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .chat-header {
            background: #0f0f23;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .chat-header h2 {
            color: #00ff88;
        }
        .room-info {
            font-size: 14px;
            color: #888;
        }
        .messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #0a0a15;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 10px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.sent {
            background: #00ff8820;
            border-left: 3px solid #00ff88;
            margin-left: 20%;
        }
        .message.received {
            background: #4a4a8a30;
            border-left: 3px solid #8888ff;
            margin-right: 20%;
        }
        .message .username {
            font-weight: bold;
            color: #00ff88;
            font-size: 12px;
        }
        .message .content {
            margin-top: 5px;
            font-size: 15px;
        }
        .message .time {
            font-size: 10px;
            color: #666;
            margin-top: 3px;
        }
        .input-area {
            padding: 20px;
            background: #0f0f23;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #2a2a4a;
            color: #fff;
            font-size: 14px;
        }
        .input-area input:focus {
            outline: none;
            border-color: #00ff88;
        }
        .input-area button {
            padding: 12px 25px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .input-area button:hover {
            background: #00cc6a;
        }
        .status {
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }
        .status.connected {
            color: #00ff88;
        }
        .status.disconnected {
            color: #ff4444;
        }
        .status.connecting {
            color: #ffaa00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 CryptoLab WebSocket Chat</h1>
        
        <div class="setup" id="setup">
            <h3>Rejoindre une salle de chat</h3>
            <br>
            <input type="text" id="username" placeholder="Votre nom" value="Alice">
            <input type="text" id="room" placeholder="Nom de la salle" value="crypto2026">
            <button onclick="connectToChat()">Se connecter</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="chat-header">
                <h2>💬 Salon: <span id="currentRoom"></span></h2>
                <div class="room-info">
                    Connecté en tant que: <span id="currentUser" style="color: #00ff88;"></span>
                </div>
            </div>
            <div class="status connecting" id="status">Connexion en cours...</div>
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Tapez votre message..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Envoyer</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let username = '';
        let room = '';

        function connectToChat() {
            username = document.getElementById('username').value;
            room = document.getElementById('room').value;
            
            if (!username || !room) {
                alert('Veuillez entrer un nom et une salle');
                return;
            }

            const wsUrl = `ws://localhost:8080/ws/chat?room=${room}&username=${username}`;
            
            document.getElementById('status').className = 'status connecting';
            document.getElementById('status').textContent = 'Connexion en cours...';
            
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'block';
                document.getElementById('currentRoom').textContent = room;
                document.getElementById('currentUser').textContent = username;
                document.getElementById('status').className = 'status connected';
                document.getElementById('status').textContent = '✓ Connecté';
                
                addMessage({
                    type: 'system',
                    username: 'Système',
                    content: `Bienvenue dans le salon ${room}!`
                });
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'message') {
                        addMessage({
                            username: data.username,
                            content: data.content,
                            timestamp: data.timestamp,
                            isSent: data.username === username
                        });
                    }
                } catch (e) {
                    console.log('Message reçu:', event.data);
                }
            };

            ws.onclose = function() {
                document.getElementById('status').className = 'status disconnected';
                document.getElementById('status').textContent = '✗ Déconnecté';
                addMessage({
                    type: 'system',
                    username: 'Système',
                    content: 'Connexion perdue. Actualisez pour reconnecter.'
                });
            };

            ws.onerror = function(error) {
                console.error('Erreur WebSocket:', error);
                document.getElementById('status').textContent = 'Erreur de connexion';
            };
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (content && ws && ws.readyState === WebSocket.OPEN) {
                const message = {
                    type: 'message',
                    room_id: room,
                    username: username,
                    content: content,
                    timestamp: new Date().toISOString()
                };
                
                ws.send(JSON.stringify(message));
                input.value = '';
                
                addMessage({
                    username: username,
                    content: content,
                    timestamp: new Date().toISOString(),
                    isSent: true
                });
            }
        }

        function addMessage(data) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            
            if (data.type === 'system') {
                msgDiv.className = 'message system';
                msgDiv.innerHTML = `<div class="content" style="color: #ffaa00; text-align: center;">${data.content}</div>`;
            } else {
                msgDiv.className = data.isSent ? 'message sent' : 'message received';
                const time = new Date(data.timestamp).toLocaleTimeString('fr-FR');
                msgDiv.innerHTML = `
                    <div class="username">${data.username}</div>
                    <div class="content">${data.content}</div>
                    <div class="time">${time}</div>
                `;
            }
            
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
